name: CI — Test & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # ── 静的解析 ────────────────────────────────────────────
      - name: Lint with ruff
        run: ruff check app/ tests/

      - name: Type check with mypy
        run: mypy app/ --ignore-missing-imports

      # ── テスト実行 ──────────────────────────────────────────
      - name: Run tests with pytest
        env:
          # テスト用環境変数（SQLite インメモリ使用）
          DATABASE_URL: sqlite:///./test.db
          API_KEY: test-api-key-for-pytest
          ENVIRONMENT: development
        run: pytest tests/ -v --cov=app --cov-report=xml --cov-report=html:htmlcov --cov-fail-under=90

      # ── カバレッジレポート ──────────────────────────────────
      - name: Upload coverage HTML report as artifact
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-html-report
          path: htmlcov/
          retention-days: 30

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
