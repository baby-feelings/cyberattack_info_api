name: Daily Crawl — KEV & OSV & JVN

# GitHub Actions の GITHUB_TOKEN に対して最小権限を明示（最小権限の原則）
permissions:
  contents: read

# 毎日 UTC 19:05（JST 翌 04:05）に 1 回のみ発火し、KEV → OSV → JVN を順次実行する。
# GitHub Actions 無料プランでは複数 cron の発火が不安定なため、単一 cron に統合。
on:
  schedule:
    - cron: '5 19 * * *'   # JST 翌 04:05
  workflow_dispatch:
    inputs:
      target:
        description: '実行対象 (kev / osv / jvn / all)'
        required: false
        default: 'all'

env:
  API_BASE_URL: https://cyberattack-info-api.onrender.com

jobs:
  # ── Render 起動 ────────────────────────────────────────────────
  wake-up:
    name: Wake up Render
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render service
        # Render の Free プランはスリープするため、まずヘルスチェックで起こす
        run: |
          echo "Waking up Render service..."
          for i in 1 2 3; do
            STATUS=$(curl -s --connect-timeout 10 --max-time 30 --fail -o /dev/null -w "%{http_code}" "$API_BASE_URL/health" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Service is awake."
              break
            fi
            sleep 20
          done

  # ── CISA KEV クローラー ─────────────────────────────────────────
  crawl-kev:
    name: CISA KEV Crawl
    runs-on: ubuntu-latest
    needs: wake-up
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.target == 'kev' ||
      github.event.inputs.target == 'all'
    steps:
      - name: Trigger KEV crawl
        run: |
          echo "Triggering CISA KEV crawl..."
          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 120 -X POST "$API_BASE_URL/admin/crawl" \
            -H "X-API-KEY: ${{ secrets.API_KEY }}")
          HTTP_STATUS=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "KEV crawl failed with HTTP $HTTP_STATUS"
            exit 1
          fi

  # ── OSV クローラー ──────────────────────────────────────────────
  crawl-osv:
    name: OSV Crawl
    runs-on: ubuntu-latest
    needs: [wake-up, crawl-kev]
    # KEV が失敗してもスキップされても OSV は実行する
    if: |
      always() && needs.wake-up.result == 'success' && (
        github.event_name == 'schedule' ||
        github.event.inputs.target == 'osv' ||
        github.event.inputs.target == 'all'
      )
    steps:
      - name: Trigger OSV crawl
        # OSV クローラーは件数が多く時間がかかるため timeout を長めに設定
        run: |
          echo "Triggering OSV crawl..."
          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 600 -X POST "$API_BASE_URL/admin/osv-crawl" \
            -H "X-API-KEY: ${{ secrets.API_KEY }}")
          HTTP_STATUS=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "OSV crawl failed with HTTP $HTTP_STATUS"
            exit 1
          fi

  # ── JVN クローラー ──────────────────────────────────────────────
  crawl-jvn:
    name: JVN Crawl
    runs-on: ubuntu-latest
    needs: [wake-up, crawl-osv]
    # OSV が失敗してもスキップされても JVN は実行する
    if: |
      always() && needs.wake-up.result == 'success' && (
        github.event_name == 'schedule' ||
        github.event.inputs.target == 'jvn' ||
        github.event.inputs.target == 'all'
      )
    steps:
      - name: Trigger JVN crawl
        run: |
          echo "Triggering JVN crawl..."
          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 600 -X POST "$API_BASE_URL/admin/jvn-crawl" \
            -H "X-API-KEY: ${{ secrets.API_KEY }}")
          HTTP_STATUS=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "JVN crawl failed with HTTP $HTTP_STATUS"
            exit 1
          fi
