name: OSV-Scanner — Scheduled Scan

# 毎週月曜 12:30 UTC（JST 21:30）と main マージ時に全依存ライブラリをスキャン
on:
  schedule:
    - cron: "30 12 * * 1"
  push:
    branches: [main]

permissions:
  actions: read
  contents: read
  # google/osv-scanner-action の reusable workflow が security-events: write を要求するため付与
  security-events: write

jobs:
  scan-scheduled:
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8"
    with:
      # requirements.txt / package.json を再帰的にスキャン
      scan-args: "--recursive ./"
      # Code Scanning（GitHub Advanced Security）未有効のため SARIF アップロードを無効化
      upload-sarif: false
