name: OSV-Scanner — PR Scan

# PRで新たに導入された脆弱性のみを検出する（ベースブランチとの差分スキャン）
on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]

permissions:
  actions: read
  contents: read

jobs:
  scan-pr:
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.8"
    with:
      # requirements.txt / package.json を再帰的にスキャン
      scan-args: "--recursive ./"
      # Code Scanning（GitHub Advanced Security）未有効のため SARIF アップロードを無効化
      upload-sarif: false
