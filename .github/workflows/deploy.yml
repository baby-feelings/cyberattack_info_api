name: CD — Deploy to Production

on:
  push:
    branches: [main]
  # 手動トリガーも可能
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    # CI が通った後にのみデプロイする
    needs: []  # CI workflow とは独立しているため、メインブランチマージ後に実行

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Render へのデプロイ（Render を使う場合） ─────────────
      # Render の Deploy Hook URL を GitHub Secrets に登録してください。
      # Secret 名: RENDER_DEPLOY_HOOK_URL
      - name: Trigger Render deploy
        if: ${{ vars.DEPLOY_TARGET == 'render' || vars.DEPLOY_TARGET == '' }}
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
            echo "Render deploy triggered"
          else
            echo "RENDER_DEPLOY_HOOK_URL is not set. Skipping Render deploy."
          fi

