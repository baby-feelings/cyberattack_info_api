name: CD — Deploy to Production

on:
  push:
    branches: [main]
  # 手動トリガーも可能
  workflow_dispatch:

jobs:
  # ── Render（バックエンド API）デプロイ ──────────────────────────
  deploy-render:
    name: Deploy API to Render
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Render deploy
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
            echo "Render deploy triggered"
          else
            echo "RENDER_DEPLOY_HOOK_URL is not set. Skipping Render deploy."
          fi

  # ── Vercel（フロントエンド ダッシュボード）デプロイ ────────────
  deploy-vercel:
    name: Deploy Dashboard to Vercel
    runs-on: ubuntu-latest
    # dashboard/ 配下に変更があった場合のみデプロイ
    # （バックエンドのみの変更でダッシュボードを再デプロイしない）

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (Production)
        # VERCEL_TOKEN が未設定の場合はスキップ（secrets は if: 条件で参照不可のためシェルで判定）
        working-directory: dashboard
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN is not set. Skipping Vercel deploy."
            exit 0
          fi
          vercel deploy --prod --token="$VERCEL_TOKEN" --yes
